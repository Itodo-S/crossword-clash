<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <rect width="192" height="192" rx="24" fill="#1a1a2e"/>
  <g transform="translate(24, 24)">
    <!-- 4x4 crossword mini grid -->
    <rect x="0" y="0" width="32" height="32" rx="4" fill="#16213e"/>
    <rect x="36" y="0" width="32" height="32" rx="4" fill="#16213e"/>
    <rect x="72" y="0" width="32" height="32" rx="4" fill="#16213e"/>
    <rect x="108" y="0" width="32" height="32" rx="4" fill="#0f172a"/>

    <rect x="0" y="36" width="32" height="32" rx="4" fill="#16213e"/>
    <rect x="36" y="36" width="32" height="32" rx="4" fill="#3b82f6" opacity="0.4"/>
    <rect x="72" y="36" width="32" height="32" rx="4" fill="#16213e"/>
    <rect x="108" y="36" width="32" height="32" rx="4" fill="#16213e"/>

    <rect x="0" y="72" width="32" height="32" rx="4" fill="#0f172a"/>
    <rect x="36" y="72" width="32" height="32" rx="4" fill="#16213e"/>
    <rect x="72" y="72" width="32" height="32" rx="4" fill="#f59e0b" opacity="0.4"/>
    <rect x="108" y="72" width="32" height="32" rx="4" fill="#16213e"/>

    <rect x="0" y="108" width="32" height="32" rx="4" fill="#16213e"/>
    <rect x="36" y="108" width="32" height="32" rx="4" fill="#16213e"/>
    <rect x="72" y="108" width="32" height="32" rx="4" fill="#0f172a"/>
    <rect x="108" y="108" width="32" height="32" rx="4" fill="#16213e"/>

    <!-- Letters -->
    <text x="16" y="22" text-anchor="middle" fill="white" font-family="monospace" font-size="18" font-weight="bold">C</text>
    <text x="52" y="22" text-anchor="middle" fill="white" font-family="monospace" font-size="18" font-weight="bold">R</text>
    <text x="88" y="22" text-anchor="middle" fill="white" font-family="monospace" font-size="18" font-weight="bold">O</text>

    <text x="16" y="58" text-anchor="middle" fill="white" font-family="monospace" font-size="18" font-weight="bold">L</text>
    <text x="52" y="58" text-anchor="middle" fill="#3b82f6" font-family="monospace" font-size="18" font-weight="bold">A</text>
    <text x="88" y="58" text-anchor="middle" fill="white" font-family="monospace" font-size="18" font-weight="bold">S</text>
    <text x="124" y="58" text-anchor="middle" fill="white" font-family="monospace" font-size="18" font-weight="bold">H</text>

    <text x="52" y="94" text-anchor="middle" fill="white" font-family="monospace" font-size="18" font-weight="bold">I</text>
    <text x="88" y="94" text-anchor="middle" fill="#f59e0b" font-family="monospace" font-size="18" font-weight="bold">N</text>
    <text x="124" y="94" text-anchor="middle" fill="white" font-family="monospace" font-size="18" font-weight="bold">K</text>

    <text x="16" y="130" text-anchor="middle" fill="white" font-family="monospace" font-size="18" font-weight="bold">E</text>
    <text x="52" y="130" text-anchor="middle" fill="white" font-family="monospace" font-size="18" font-weight="bold">D</text>
    <text x="124" y="130" text-anchor="middle" fill="white" font-family="monospace" font-size="18" font-weight="bold">S</text>
  </g>
</svg>
