<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="64" fill="#1a1a2e"/>
  <g transform="translate(64, 56)">
    <!-- Title -->
    <text x="192" y="40" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="36" font-weight="bold">CROSSWORD</text>
    <text x="192" y="72" text-anchor="middle" fill="#FFD700" font-family="monospace" font-size="28" font-weight="bold">CLASH</text>

    <!-- 4x4 crossword grid -->
    <g transform="translate(72, 100)">
      <rect x="0" y="0" width="56" height="56" rx="6" fill="#16213e"/>
      <rect x="64" y="0" width="56" height="56" rx="6" fill="#16213e"/>
      <rect x="128" y="0" width="56" height="56" rx="6" fill="#16213e"/>
      <rect x="192" y="0" width="56" height="56" rx="6" fill="#0f172a"/>

      <rect x="0" y="64" width="56" height="56" rx="6" fill="#16213e"/>
      <rect x="64" y="64" width="56" height="56" rx="6" fill="#3b82f6" opacity="0.3"/>
      <rect x="128" y="64" width="56" height="56" rx="6" fill="#16213e"/>
      <rect x="192" y="64" width="56" height="56" rx="6" fill="#16213e"/>

      <rect x="0" y="128" width="56" height="56" rx="6" fill="#0f172a"/>
      <rect x="64" y="128" width="56" height="56" rx="6" fill="#16213e"/>
      <rect x="128" y="128" width="56" height="56" rx="6" fill="#f59e0b" opacity="0.3"/>
      <rect x="192" y="128" width="56" height="56" rx="6" fill="#16213e"/>

      <rect x="0" y="192" width="56" height="56" rx="6" fill="#16213e"/>
      <rect x="64" y="192" width="56" height="56" rx="6" fill="#16213e"/>
      <rect x="128" y="192" width="56" height="56" rx="6" fill="#0f172a"/>
      <rect x="192" y="192" width="56" height="56" rx="6" fill="#16213e"/>

      <!-- Letters -->
      <text x="28" y="38" text-anchor="middle" fill="white" font-family="monospace" font-size="28" font-weight="bold">C</text>
      <text x="92" y="38" text-anchor="middle" fill="white" font-family="monospace" font-size="28" font-weight="bold">R</text>
      <text x="156" y="38" text-anchor="middle" fill="white" font-family="monospace" font-size="28" font-weight="bold">O</text>

      <text x="28" y="102" text-anchor="middle" fill="white" font-family="monospace" font-size="28" font-weight="bold">L</text>
      <text x="92" y="102" text-anchor="middle" fill="#3b82f6" font-family="monospace" font-size="28" font-weight="bold">A</text>
      <text x="156" y="102" text-anchor="middle" fill="white" font-family="monospace" font-size="28" font-weight="bold">S</text>
      <text x="220" y="102" text-anchor="middle" fill="white" font-family="monospace" font-size="28" font-weight="bold">H</text>

      <text x="92" y="166" text-anchor="middle" fill="white" font-family="monospace" font-size="28" font-weight="bold">I</text>
      <text x="156" y="166" text-anchor="middle" fill="#f59e0b" font-family="monospace" font-size="28" font-weight="bold">N</text>
      <text x="220" y="166" text-anchor="middle" fill="white" font-family="monospace" font-size="28" font-weight="bold">K</text>

      <text x="28" y="230" text-anchor="middle" fill="white" font-family="monospace" font-size="28" font-weight="bold">E</text>
      <text x="92" y="230" text-anchor="middle" fill="white" font-family="monospace" font-size="28" font-weight="bold">D</text>
      <text x="220" y="230" text-anchor="middle" fill="white" font-family="monospace" font-size="28" font-weight="bold">S</text>
    </g>
  </g>
</svg>
